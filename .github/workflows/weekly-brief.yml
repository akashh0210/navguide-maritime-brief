name: Weekly Maritime Intelligence Brief

on:
  schedule:
    - cron: '30 2 * * 1'  # 02:30 UTC = 08:00 IST, every Monday (GitHub cron is UTC, may drift a few minutes)
  workflow_dispatch:        # manual trigger - use the "Run workflow" button in the Actions tab

jobs:
  run-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python src/main.py
